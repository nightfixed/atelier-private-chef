name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package.json

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: false
          
      - name: Build Next.js static export
        working-directory: web
        run: npm run build
        env:
          GITHUB_PAGES: true
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}

      - name: Inject API_URL into static HTML files
        working-directory: web
        env:
          API_URL: ${{ vars.API_URL }}
        run: |
          for file in out/*.html out/**/*.html; do
            [ -f "$file" ] && sed -i "s|__API_URL__|${API_URL}|g" "$file"
          done

      - name: Ensure CNAME is in output
        working-directory: web
        run: cp public/CNAME out/CNAME
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
